<template>
    <lightning-card title="Product Image Preview" icon-name="utility:image">
        <div class="slds-var-m-around_medium container slds-align_absolute-center" style="height: 250px; overflow: hidden; display: flex; justify-content: center; align-items: center;">
            <template if:true={imageUrl}>
                <img src={imageUrl} alt="Product Image Preview" class="preview-image" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); transition: transform 0.3s ease;"/>
            </template>
            <template if:false={imageUrl}>
                <div class="no-image">
                    <p style="color: #706e6b; font-size: 14px;">No product image URL populated.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
