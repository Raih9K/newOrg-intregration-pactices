<template>
    <div class="slds-box slds-theme_default">
        <template if:true={isSyncing}>
            <div class="slds-align_absolute-center slds-var-p-around_large" style="height: 100px; flex-direction: column;">
                <lightning-spinner alternative-text="Syncing products..." size="medium"></lightning-spinner>
                <div class="slds-var-m-top_medium">Syncing products from EscuelaJS API. Please wait...</div>
            </div>
        </template>
        
        <template if:false={isSyncing}>
            <div class="slds-align_absolute-center slds-var-p-around_large" style="flex-direction: column;">
                <h3 class="slds-text-heading_medium slds-var-m-bottom_medium">Sync Catalog Data</h3>
                <p class="slds-var-m-bottom_medium slds-text-color_weak">Click below to fetch and synchronize products from the external EscuelaJS service.</p>
                <lightning-button label="Sync Products Now" variant="brand" onclick={handleSync} icon-name="utility:sync"></lightning-button>
            </div>
        </template>
    </div>
</template>
